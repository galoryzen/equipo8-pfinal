services:
  # ── Infrastructure ──────────────────────────────────────
  thub-postgres:
    image: postgres:16-alpine
    container_name: thub-postgres
    environment:
      POSTGRES_USER: travelhub
      POSTGRES_PASSWORD: travelhub_dev
      POSTGRES_DB: travelhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/02-load-cities.sql:/docker-entrypoint-initdb.d/02-load-cities.sql
      - ../dane.csv:/docker-entrypoint-initdb.d/dane.csv
      - ./db/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelhub -d travelhub"]
      interval: 5s
      timeout: 3s
      retries: 5

  thub-redis:
    image: redis:7-alpine
    container_name: thub-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  thub-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: thub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: travelhub
      RABBITMQ_DEFAULT_PASS: travelhub_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  thub-gateway:
    image: nginx:alpine
    container_name: thub-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - thub-auth
      - thub-catalog
      - thub-booking
      - thub-payment
      - thub-notification

  # ── Microservices ───────────────────────────────────────
  thub-auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: thub-auth
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth/app:/app/app
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      AUTH_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      AUTH_DB_SCHEMA: "users"
      AUTH_REDIS_URL: "redis://thub-redis:6379/0"
      AUTH_DEBUG: "true"
      JWT_SECRET: "change-me-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "60"
      AUTH_PARTNER_ADMIN_SECRET: "dev-partner-admin-secret"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-redis:
        condition: service_healthy

  thub-catalog:
    build:
      context: .
      dockerfile: services/catalog/Dockerfile
    container_name: thub-catalog
    ports:
      - "8002:8000"
    volumes:
      - ./services/catalog/app:/app/app
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      CATALOG_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      CATALOG_DB_SCHEMA: "catalog"
      CATALOG_REDIS_URL: "redis://thub-redis:6379/0"
      CATALOG_DEBUG: "true"
      JWT_SECRET: "change-me-in-production"
      JWT_ALGORITHM: "HS256"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-redis:
        condition: service_healthy

  thub-booking:
    build:
      context: .
      dockerfile: services/booking/Dockerfile
    container_name: thub-booking
    ports:
      - "8003:8000"
    volumes:
      - ./services/booking/app:/app/app
      - ./services/booking/tests:/app/tests
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      BOOKING_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      BOOKING_DB_SCHEMA: "booking"
      BOOKING_REDIS_URL: "redis://thub-redis:6379/0"
      BOOKING_DEBUG: "true"
      BOOKING_JWT_SECRET: "change-me-in-production"
      BOOKING_JWT_ALGORITHM: "HS256"
      BOOKING_CATALOG_SERVICE_URL: "http://thub-catalog:8000"
      BOOKING_EVENT_PUBLISHER_BACKEND: "rabbitmq"
      BOOKING_RABBITMQ_URL: "amqp://travelhub:travelhub_dev@thub-rabbitmq:5672/"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-redis:
        condition: service_healthy
      thub-rabbitmq:
        condition: service_healthy

  thub-booking-worker:
    build:
      context: .
      dockerfile: services/booking/Dockerfile
    container_name: thub-booking-worker
    volumes:
      - ./services/booking/app:/app/app
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["python", "-m", "app.worker"]
    restart: on-failure
    environment:
      BOOKING_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      BOOKING_DB_SCHEMA: "booking"
      BOOKING_DEBUG: "true"
      BOOKING_CATALOG_SERVICE_URL: "http://thub-catalog:8000"
      BOOKING_EVENT_CONSUMER_BACKEND: "rabbitmq"
      BOOKING_RABBITMQ_URL: "amqp://travelhub:travelhub_dev@thub-rabbitmq:5672/"
      BOOKING_PAYMENT_RESULT_QUEUE: "booking.payment-result"
      BOOKING_SCHEDULER_ENABLED: "true"
      BOOKING_CONSUMER_ENABLED: "true"
      BOOKING_WORKER_EXPIRE_INTERVAL_SECONDS: "60"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-rabbitmq:
        condition: service_healthy

  thub-payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: thub-payment
    ports:
      - "8004:8000"
    volumes:
      - ./services/payment/app:/app/app
      - ./services/payment/tests:/app/tests
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      PAYMENT_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      PAYMENT_DB_SCHEMA: "payments"
      PAYMENT_REDIS_URL: "redis://thub-redis:6379/0"
      PAYMENT_DEBUG: "true"
      PAYMENT_JWT_SECRET: "change-me-in-production"
      PAYMENT_JWT_ALGORITHM: "HS256"
      PAYMENT_BOOKING_SERVICE_URL: "http://thub-booking:8000"
      PAYMENT_EVENT_PUBLISHER_BACKEND: "rabbitmq"
      PAYMENT_RABBITMQ_URL: "amqp://travelhub:travelhub_dev@thub-rabbitmq:5672/"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-redis:
        condition: service_healthy
      thub-rabbitmq:
        condition: service_healthy

  thub-payment-worker:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: thub-payment-worker
    volumes:
      - ./services/payment/app:/app/app
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["python", "-m", "app.worker"]
    restart: on-failure
    environment:
      PAYMENT_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      PAYMENT_DB_SCHEMA: "payments"
      PAYMENT_DEBUG: "true"
      PAYMENT_EVENT_CONSUMER_BACKEND: "rabbitmq"
      PAYMENT_EVENT_PUBLISHER_BACKEND: "rabbitmq"
      PAYMENT_RABBITMQ_URL: "amqp://travelhub:travelhub_dev@thub-rabbitmq:5672/"
      PAYMENT_REQUESTED_QUEUE: "payment.payment-requested"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-rabbitmq:
        condition: service_healthy

  thub-notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    container_name: thub-notification
    ports:
      - "8005:8000"
    volumes:
      - ./services/notification/app:/app/app
      - ./libs/shared:/app/shared
      - ./libs/contracts:/app/contracts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      NOTIFICATION_DATABASE_URL: "postgresql+asyncpg://travelhub:travelhub_dev@thub-postgres:5432/travelhub"
      NOTIFICATION_DB_SCHEMA: "notifications"
      NOTIFICATION_REDIS_URL: "redis://thub-redis:6379/0"
      NOTIFICATION_DEBUG: "true"
      JWT_SECRET: "change-me-in-production"
      JWT_ALGORITHM: "HS256"
      PYTHONPATH: "/app"
    depends_on:
      thub-postgres:
        condition: service_healthy
      thub-redis:
        condition: service_healthy

volumes:
  pgdata:
