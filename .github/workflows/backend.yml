name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.build-list.outputs.services }}
    steps:
      - uses: actions/checkout@v5

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            auth:
              - 'backend/services/auth/**'
              - 'backend/libs/**'
            catalog:
              - 'backend/services/catalog/**'
              - 'backend/libs/**'
            booking:
              - 'backend/services/booking/**'
              - 'backend/libs/**'
            payment:
              - 'backend/services/payment/**'
              - 'backend/libs/**'
            notification:
              - 'backend/services/notification/**'
              - 'backend/libs/**'

      - id: build-list
        env:
          AUTH: ${{ steps.filter.outputs.auth }}
          CATALOG: ${{ steps.filter.outputs.catalog }}
          BOOKING: ${{ steps.filter.outputs.booking }}
          PAYMENT: ${{ steps.filter.outputs.payment }}
          NOTIFICATION: ${{ steps.filter.outputs.notification }}
        run: |
          SERVICES="[]"
          for svc in auth catalog booking payment notification; do
            VAR=$(echo "$svc" | tr '[:lower:]' '[:upper:]')
            if [ "${!VAR}" == "true" ]; then
              SERVICES=$(echo "$SERVICES" | jq -c ". + [\"$svc\"]")
            fi
          done
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.services != '[]'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Test changed services
        env:
          CHANGED: ${{ needs.changes.outputs.services }}
        run: |
          for svc in $(echo "$CHANGED" | jq -r '.[]'); do
            echo "::group::Testing $svc"
            cd backend/services/$svc
            pip install -r requirements.txt -q
            pytest tests/ -v --cov=app --cov-fail-under=70
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.services != '[]'
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build, push, and deploy changed services
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          CHANGED: ${{ needs.changes.outputs.services }}
        run: |
          for svc in $(echo "$CHANGED" | jq -r '.[]'); do
            echo "::group::Deploying $svc"

            # Build and push (using ECR latest as layer cache)
            IMAGE_URI=$ECR_REGISTRY/travelhub/$svc
            docker pull $IMAGE_URI:latest || true
            DOCKER_BUILDKIT=1 docker build \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              --cache-from $IMAGE_URI:latest \
              -f backend/services/$svc/Dockerfile \
              -t $IMAGE_URI:$IMAGE_TAG \
              -t $IMAGE_URI:latest \
              backend
            docker push $IMAGE_URI:$IMAGE_TAG
            docker push $IMAGE_URI:latest

            # Update ECS task definition and deploy
            aws ecs describe-task-definition \
              --task-definition thub-$svc \
              --query taskDefinition \
              > task-def.json

            NEW_IMAGE="$IMAGE_URI:$IMAGE_TAG"
            jq --arg img "$NEW_IMAGE" --arg name "$svc" \
              '.containerDefinitions |= map(if .name == $name then .image = $img else . end) |
               del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
              task-def.json > task-def-updated.json

            NEW_TASK_DEF=$(aws ecs register-task-definition \
              --cli-input-json file://task-def-updated.json \
              --query taskDefinition.taskDefinitionArn \
              --output text)

            aws ecs update-service \
              --cluster travelhub \
              --service thub-$svc \
              --task-definition "$NEW_TASK_DEF" \
              --force-new-deployment \
              --query 'service.serviceArn' --output text

            # For services with a matching worker, roll it with the same image.
            # Worker env vars are owned by Terraform and preserved via
            # describe-task-definition.
            if [[ "$svc" == "booking" || "$svc" == "payment" || "$svc" == "notification" ]]; then
              WORKER_FAMILY="thub-$svc-worker"
              aws ecs describe-task-definition \
                --task-definition "$WORKER_FAMILY" \
                --query taskDefinition \
                > worker-task-def.json

              jq --arg img "$NEW_IMAGE" --arg name "$svc-worker" \
                '.containerDefinitions |= map(if .name == $name then .image = $img else . end) |
                 del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
                worker-task-def.json > worker-task-def-updated.json

              NEW_WORKER_TASK_DEF=$(aws ecs register-task-definition \
                --cli-input-json file://worker-task-def-updated.json \
                --query taskDefinition.taskDefinitionArn \
                --output text)

              aws ecs update-service \
                --cluster travelhub \
                --service "$WORKER_FAMILY" \
                --task-definition "$NEW_WORKER_TASK_DEF" \
                --force-new-deployment \
                --query 'service.serviceArn' --output text
            fi

            echo "::endgroup::"
          done

  backend-result:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "Backend tests failed"
            exit 1
          fi
          echo "Backend CI passed (tests ran: ${{ needs.test.result != 'skipped' }})"
