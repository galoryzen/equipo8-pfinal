name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  BACKEND_URL: ${{ secrets.BACKEND_URL }}

jobs:
  # --- Job 1: Detect which services changed ---
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.build-list.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'backend/services/auth/**'
              - 'backend/libs/**'
            catalog:
              - 'backend/services/catalog/**'
              - 'backend/libs/**'
            booking:
              - 'backend/services/booking/**'
              - 'backend/libs/**'
            payment:
              - 'backend/services/payment/**'
              - 'backend/libs/**'
            notification:
              - 'backend/services/notification/**'
              - 'backend/libs/**'

      - id: build-list
        env:
          AUTH: ${{ steps.filter.outputs.auth }}
          CATALOG: ${{ steps.filter.outputs.catalog }}
          BOOKING: ${{ steps.filter.outputs.booking }}
          PAYMENT: ${{ steps.filter.outputs.payment }}
          NOTIFICATION: ${{ steps.filter.outputs.notification }}
        run: |
          SERVICES="[]"
          for svc in auth catalog booking payment notification; do
            VAR=$(echo "$svc" | tr '[:lower:]' '[:upper:]')
            if [ "${!VAR}" == "true" ]; then
              SERVICES=$(echo "$SERVICES" | jq -c ". + [\"$svc\"]")
            fi
          done
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

  # --- Job 2: Run tests on affected services ---
  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    defaults:
      run:
        working-directory: backend/services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  # --- Job 3: Build + Push to ECR (only on push to main) ---
  build-push:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/travelhub/${{ matrix.service }}
          docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest backend/services/${{ matrix.service }}
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

  # --- Job 4: Deploy to ECS (only on push to main) ---
  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition thub-${{ matrix.service }} \
            --query taskDefinition \
            > task-definition.json

      - uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.service }}
          image: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/travelhub/${{ matrix.service }}:${{ github.sha }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: thub-${{ matrix.service }}
          cluster: travelhub
          wait-for-service-stability: true

      - name: Smoke test
        run: |
          SVC=${{ matrix.service }}
          PATH_PREFIX=$([ "$SVC" = "notification" ] && echo "notifications" || echo "$SVC")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ env.BACKEND_URL }}/api/v1/${PATH_PREFIX}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed for $SVC: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed for $SVC: HTTP $STATUS"