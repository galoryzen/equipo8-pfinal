name: Backend CI

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, catalog, booking, payment, notification]
    defaults:
      run:
        working-directory: backend/services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [auth, catalog, booking, payment, notification]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t thub-${{ matrix.service }} backend/services/${{ matrix.service }}
