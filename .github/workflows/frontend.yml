name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'

  frontend-ci:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend/travel-hub
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/travel-hub/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Prettier
        run: pnpm format:check
      - name: ESLint (max 5 warnings; errors fail)
        run: pnpm lint:precommit
      - name: Tests, coverage & accessibility (axe)
        run: pnpm test:coverage
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          name: frontend-build
          path: frontend/travel-hub/out/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend/travel-hub
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/travel-hub/out/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync out/ s3://${{ env.FRONTEND_S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Smoke test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.FRONTEND_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"

  frontend-result:
    runs-on: ubuntu-latest
    needs: [changes, frontend-ci]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.frontend-ci.result }}" = "failure" ]; then
            echo "Frontend tests failed"
            exit 1
          fi
          echo "Frontend CI passed (tests ran: ${{ needs.frontend-ci.result != 'skipped' }})"
