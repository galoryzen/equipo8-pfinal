name: Frontend CI

on:
  push:
    branches: [main]
    paths: [frontend/**]
  pull_request:
    branches: [main]
    paths: [frontend/**]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/travel-hub
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/travel-hub/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend/travel-hub
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/travel-hub/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
